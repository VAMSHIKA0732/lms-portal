services:
  - type: web
    name: lms-portal
    env: node
    buildCommand: npm run install-all && npm run build-client
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000

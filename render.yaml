services:
  - type: web
    name: lms-portal
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # User will need to provide this in the Render dashboard
      - key: PORT
        value: 5000
